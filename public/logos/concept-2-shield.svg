<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="shieldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F4C8B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0D3B6E;stop-opacity:1" />
    </linearGradient>
    <filter id="shieldShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#F0F7FF" stroke="#0F4C8B" stroke-width="2"/>
  
  <!-- Shield shape -->
  <path d="M 100 30 L 60 50 L 60 100 Q 100 145 100 150 Q 100 145 140 100 L 140 50 Z" fill="url(#shieldGradient)" stroke="#0D3B6E" stroke-width="2" filter="url(#shieldShadow)"/>
  
  <!-- Rx symbol -->
  <g transform="translate(100, 95)">
    <text x="0" y="0" style="font-size: 50px; font-weight: bold; fill: white; text-anchor: middle; font-family: Georgia, serif;">℞</text>
  </g>
  
  <circle cx="100" cy="100" r="75" fill="none" stroke="white" stroke-width="1" opacity="0.2"/>
</svg>